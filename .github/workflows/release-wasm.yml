name: Publish wasm (npm)

# Builds the wasm cdylib and publishes @momiji-rs/sasso to npm on a version
# tag, alongside the cargo-dist binary release. Needs an NPM_TOKEN secret
# (an npm automation/granular token with publish rights to the @momiji-rs
# scope). Publishes with provenance (OIDC id-token).

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

jobs:
  publish-wasm:
    name: build + npm publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm
      - name: install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: build wasm module
        run: bash wasm/build.sh
      - name: stage license files
        run: cp LICENSE-APACHE LICENSE-MIT wasm/npm/
      - name: sync version to the release tag
        working-directory: wasm/npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: npm publish
        working-directory: wasm/npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
