name: Publish wasm (npm)

# Builds the wasm cdylib and publishes @momiji-rs/sasso to npm on a version
# tag, alongside the cargo-dist binary release. Authenticates via npm Trusted
# Publishing (OIDC) — NO NPM_TOKEN secret needed. One-time setup on npmjs.com:
# add a trusted publisher for @momiji-rs/sasso (GitHub repo momiji-rs/sasso,
# workflow release-wasm.yml). Publishes with provenance via the same id-token.

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

jobs:
  publish-wasm:
    name: build + npm publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm
          # build.sh builds the size and speed variants in isolated target
          # dirs (so switching opt-level can't reuse a stale artifact).
          cache-directories: |
            wasm/target-size
            wasm/target-speed
      - name: install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: ensure OIDC-capable npm (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: build wasm module
        run: bash wasm/build.sh
      - name: stage license files
        run: cp LICENSE-APACHE LICENSE-MIT wasm/npm/
      - name: sync version to the release tag
        working-directory: wasm/npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: npm publish
        working-directory: wasm/npm
        # No NODE_AUTH_TOKEN: npm >= 11.5.1 performs the OIDC Trusted Publishing
        # token exchange automatically (id-token: write + the npmjs.com trusted
        # publisher config), which also supplies provenance.
        run: npm publish --provenance --access public
