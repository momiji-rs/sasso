name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --all-features

  parity:
    name: dart-sass parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: install dart-sass
        run: npm install -g sass
      - name: parity tests vs dart-sass
        run: SASSO_PARITY=1 SASS_BIN=sass cargo test --test parity -- --nocapture

  wasm:
    name: wasm32-wasip1 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: build (lib) for wasm
        run: cargo build --lib --target wasm32-wasip1

  ffi:
    name: C ABI (ffi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ffi
      # The ffi crate lives outside the core workspace, so fmt/clippy/build run
      # inside ffi/ (the root `cargo fmt --all` / `--all-targets` don't reach it).
      - name: rustfmt (ffi)
        run: cargo fmt --check
        working-directory: ffi
      - name: clippy (ffi)
        run: cargo clippy --release --all-targets -- -D warnings
        working-directory: ffi
      - name: build cdylib + staticlib
        run: cargo build --release
        working-directory: ffi
      - name: python ctypes smoke test
        run: python3 examples/smoke.py
        working-directory: ffi
      - name: python ctypes custom-importer test
        run: python3 examples/importer.py
        working-directory: ffi

  conformance:
    name: sass-spec ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: fetch sass-spec
        run: bash spec/fetch.sh
      - name: build release
        run: cargo build --release
      - name: pass-rate ratchet (must not regress below spec/BASELINE.json)
        run: python3 spec/check_baseline.py
      - name: failure summary by bucket (informational)
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          from collections import Counter
          path = os.path.join('spec', 'results.json')
          if not os.path.exists(path):
              print('no results.json'); raise SystemExit(0)
          cases = json.load(open(path))['cases']
          fails = [c['name'] for c in cases if c['status'] == 'FAIL']
          print(f"FAIL total: {len(fails)}")
          buckets = Counter('/'.join(n.replace(':', '/').split('/')[:3]) for n in fails)
          for k, v in buckets.most_common(30):
              print(f"{v:5} {k}")
          PYEOF
      - name: upload results.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sass-spec-results-linux
          path: spec/results.json
          if-no-files-found: ignore
